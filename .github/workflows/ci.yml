name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── AddressSanitizer ────────────────────────────────────────────────────────
  # Catches heap/stack overflows, use-after-free, and use-after-return.
  # This is the first gate: no PR merges with ASAN failures.
  asan:
    name: AddressSanitizer
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake libgtest-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: cd build && ctest --output-on-failure

  # ── ThreadSanitizer ─────────────────────────────────────────────────────────
  # Detects data races between threads. OMP_NUM_THREADS=1 forces the OpenMP
  # runtime onto a single thread, avoiding known false-positives in libgomp
  # while still exercising the MatchingEngine's own threading.
  tsan:
    name: ThreadSanitizer
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake libgtest-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=TSan

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        env:
          OMP_NUM_THREADS: "1"
          TSAN_OPTIONS: "halt_on_error=1 second_deadlock_stack=1"
        run: cd build && ctest --output-on-failure

  # ── UndefinedBehaviorSanitizer ──────────────────────────────────────────────
  # Catches signed integer overflow, out-of-bounds shifts, null dereference,
  # misaligned loads — all sources of silent corruption in hot-path C++.
  ubsan:
    name: UndefinedBehaviorSanitizer
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake libgtest-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=UBSan

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        env:
          UBSAN_OPTIONS: "halt_on_error=1 print_stacktrace=1"
        run: cd build && ctest --output-on-failure

  # ── Valgrind memcheck ───────────────────────────────────────────────────────
  # Full memory analysis: definite and indirect leaks, uninitialized reads,
  # invalid frees. Runs on a sanitizer-free binary so Valgrind can instrument
  # every instruction without interference.
  valgrind:
    name: Valgrind memcheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake libgtest-dev valgrind

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Valgrind

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run Valgrind
        run: |
          cd build
          for test in test_spsc_queue test_order_book test_matching_engine test_parameter_sweep; do
            echo "===== valgrind: $test ====="
            OMP_NUM_THREADS=1 valgrind \
              --tool=memcheck \
              --leak-check=full \
              --show-leak-kinds=definite,indirect \
              --track-origins=yes \
              --error-exitcode=1 \
              --suppressions=/usr/share/valgrind/default.supp \
              ./$test
          done

  # ── cppcheck static analysis ────────────────────────────────────────────────
  # Language-level static analysis: undefined behaviour patterns, null deref,
  # division by zero, buffer overruns that sanitizers won't catch until runtime.
  cppcheck:
    name: cppcheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck \
            --enable=warning,performance,portability \
            --std=c++20 \
            --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            --suppress=unknownMacro \
            -D_OPENMP \
            -I src \
            src/

  # ── clang-tidy ──────────────────────────────────────────────────────────────
  # Targeted lints for patterns that matter in HFT code: data races,
  # performance anti-patterns, and bug-prone constructs.
  # clang + libomp-dev are installed so CMake's find_package(OpenMP) succeeds
  # with clang++, enabling clang-analyzer-* checks on the Clang AST.
  clang-tidy:
    name: clang-tidy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake libgtest-dev clang clang-tidy libomp-dev

      - name: Configure (Clang build — generates compile_commands.json)
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Valgrind \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_CXX_COMPILER=clang++

      - name: Run clang-tidy
        run: |
          find src -name '*.cpp' | xargs clang-tidy \
            -p build \
            --checks='bugprone-*,-bugprone-easily-swappable-parameters,performance-*,concurrency-mt-unsafe,clang-analyzer-*' \
            --warnings-as-errors='bugprone-*,concurrency-*'

  # ── Code coverage ───────────────────────────────────────────────────────────
  # Measures line and branch coverage across the test suite.
  # Uploaded to Codecov for trend tracking across PRs.
  # Uses gcovr instead of lcov: Ubuntu 24.04 ships lcov 1.16 which does not
  # support the --ignore-errors inconsistent flag (added in lcov 2.0).
  coverage:
    name: Coverage
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake libgtest-dev gcovr

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Coverage

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: cd build && ctest --output-on-failure

      - name: Collect coverage
        run: |
          gcovr \
            --root . \
            --object-directory build \
            --exclude 'tests/.*' \
            --exclude '/usr/.*' \
            --print-summary \
            --xml coverage.xml

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ── MPI distributed sweep ───────────────────────────────────────────────────
  # Exercises the full MPI code path: MPI_Init, MPI_Scatter, OpenMP sub-sweep
  # per rank, MPI_Gather, sort, and CSV output — all on localhost without any
  # cluster. This validates MPICoordinator logic independently of Kubernetes.
  # OMP_NUM_THREADS=1 keeps total thread count sane on a 2-CPU runner.
  mpi:
    name: MPI distributed sweep (4 ranks)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake libgtest-dev libopenmpi-dev openmpi-bin

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Valgrind -DHFT_USE_MPI=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run MPI sweep (4 ranks on localhost)
        env:
          OMP_NUM_THREADS: "1"
          OMPI_ALLOW_RUN_AS_ROOT: "1"
          OMPI_ALLOW_RUN_AS_ROOT_CONFIRM: "1"
        run: |
          mpirun -n 4 ./build/hft-engine --mode mpi-sweep --output-csv /tmp/sweep_results.csv
          test -s /tmp/sweep_results.csv
          echo "=== Top 3 rows of sweep_results.csv ==="
          head -4 /tmp/sweep_results.csv

  # ── Kubernetes manifest validation ──────────────────────────────────────────
  # Validates YAML syntax and Kubernetes API shape for all k8s manifests.
  # --dry-run=client requires no cluster; it validates resource shape locally.
  # MPIJob (a CRD) is validated for YAML syntax only — schema validation
  # happens in the full e2e workflow.
  k8s-validate:
    name: k8s manifest validation
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        run: |
          curl -sLO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/

      - name: Validate YAML syntax (all manifests)
        run: |
          python3 - <<'EOF'
          import yaml, sys, glob
          errors = []
          for path in sorted(glob.glob("k8s/*.yaml")):
              try:
                  list(yaml.safe_load_all(open(path)))
                  print(f"  OK  {path}")
              except yaml.YAMLError as e:
                  print(f"  ERR {path}: {e}", file=sys.stderr)
                  errors.append(path)
          if errors:
              sys.exit(1)
          EOF

      - name: Validate native k8s resources (dry-run, no cluster needed)
        run: |
          echo '{"apiVersion":"v1","kind":"Config","clusters":[],"contexts":[],"users":[],"preferences":{}}' \
            > /tmp/kubeconfig
          KUBECONFIG=/tmp/kubeconfig kubectl apply --dry-run=client -f k8s/prometheus-configmap.yaml

  # ── Release build ───────────────────────────────────────────────────────────
  # Verifies that the production binary compiles with full optimizations and
  # runs without crashing on synthetic data. This is the binary that would be
  # deployed to co-lo.
  release:
    name: Release build + smoke test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake libgtest-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DHFT_BUILD_TESTS=OFF

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Smoke test — backtest mode
        run: ./build/hft-engine --mode backtest

      - name: Smoke test — sweep mode
        run: ./build/hft-engine --mode sweep
