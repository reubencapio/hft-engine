# kind-config-ci.yaml — Minimal Kind cluster for CI/CD e2e tests.
#
# 3 nodes (1 control-plane + 2 workers) instead of the production 5-node
# cluster. Sized to fit a GitHub Actions free runner (2 CPU, 7 GB RAM).
# Matches the 2-worker mpijob-ci.yaml spec.

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

nodes:
  - role: control-plane
  - role: worker
  - role: worker
